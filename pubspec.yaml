name: hapi
description: "Social Video Chat App"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ========== CORE UI ==========
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.1

  # ========== STATE MANAGEMENT ==========
  flutter_riverpod: ^3.1.0

  # ========== NAVIGATION ==========
  go_router: ^17.0.1

  # ========== FIREBASE CORE ==========
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  firebase_storage: ^13.0.5
  firebase_messaging: ^16.1.0
  firebase_analytics: ^12.1.0

  # ========== SOCIAL AUTH ==========
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.0.0

  # ========== VIDEO & AUDIO ==========
  agora_rtc_engine: ^6.3.2
  camera: ^0.11.2+1
  video_player: ^2.8.5
  record: ^6.1.2

  # ========== MEDIA & FILES ==========
  image_picker: ^1.0.4
  image_cropper: ^11.0.0
  cached_network_image: ^3.3.0
  flutter_contacts: ^1.1.9+2
  # ========== UI ENHANCEMENTS ==========
  lottie: ^3.3.2
  badges: ^3.0.3
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10
  country_pickers: ^3.0.1
  emoji_picker_flutter: ^4.4.0
  story_view: ^0.16.6

  # ========== PERMISSIONS ==========
  permission_handler: ^12.0.1

  # ========== CONNECTIVITY ==========
  connectivity_plus: ^7.0.0

  # ========== LOCATION ==========
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # ========== DATE & TIME ==========
  intl: ^0.20.2
  timeago: ^3.5.0

  # ========== UTILITIES ==========
  uuid: ^4.3.3
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.1
  package_info_plus: ^8.3.1
  device_info_plus: ^12.3.0

  # ========== NOTIFICATIONS ==========
  flutter_local_notifications: ^19.5.0

  # ========== CHARTS & ANALYTICS ==========
  fl_chart: ^1.1.1

  # ========== FILE PICKER ==========
  file_picker: ^10.3.8
  http: ^1.6.0
  image: ^4.7.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
